# CI: macOS / Ubuntu / Windows 运行 check、lint、fmt 检查与测试，验证跨平台兼容性
name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

# 工作流级 env：让基于 Node 的 GitHub Actions（如 checkout、setup-*）提前使用 Node 24 运行时，
# 便于在官方强制升级前做性能/稳定性验证。参见 GitHub 文档中的 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Show @dreamer/test version
        run: node -e "const p=require('./package.json');console.log('@dreamer/test:', p.dependencies?.['@dreamer/test']||p.devDependencies?.['@dreamer/test']||'n/a')"

      - name: Install image dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.5

      - name: Cache dependencies
        run: deno cache src/mod.ts tests/

      # 预拉并预热：deno cache 只缓存 CLI 入口，npm:tailwindcss 由 esbuild 在 build 时解析，故直接跑一次 build 预热
      - name: Warm examples build cache
        run: cd examples && deno run -A ../src/cli.ts build

      - name: Install Playwright Chromium
        run: npx -y playwright@latest install chromium

      - name: Check
        run: deno check src/ tests/

      - name: Lint
        run: deno lint

      - name: Test (Deno)
        run: deno test -A --no-check tests/

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install image dependencies (macOS)
        run: brew install imagemagick

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.5

      - name: Cache dependencies
        run: deno cache src/mod.ts tests/

      - name: Warm examples build cache
        run: cd examples && deno run -A ../src/cli.ts build

      - name: Install Playwright Chromium
        run: npx -y playwright@latest install chromium

      - name: Check
        run: deno check src/ tests/

      - name: Lint
        run: deno lint

      - name: Test (Deno, macOS)
        run: deno test -A --no-check tests/

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install image dependencies (Windows)
        run: choco install imagemagick -y
        shell: pwsh

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.5

      - name: Cache dependencies
        run: deno cache src/mod.ts tests/

      - name: Warm examples build cache
        run: cd examples && deno run -A ../src/cli.ts build

      - name: Install Playwright Chromium
        run: npx -y playwright@latest install chromium

      - name: Check
        run: deno check src/ tests/

      - name: Lint
        run: deno lint

      - name: Test (Deno, Windows)
        run: deno test -A --no-check tests/

  test-linux-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install image dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (Bun)
        run: bun install

      - name: Install examples dependencies (Bun)
        run: cd examples && bun install

      - name: Warm examples build cache
        run: cd examples && bun run ../src/cli.ts build

      # bun install 后使用依赖树里的 playwright CLI（与 @dreamer/test 同源），不用 bunx；勿用 npx @latest 以免浏览器修订号错位
      - name: Install Playwright Chromium
        run: ./node_modules/.bin/playwright install chromium

      # dom-setup 与单测同目录在 tests/unit/（原 tests/dom-setup.ts 已迁移）
      - name: Test (Bun)
        run: bun test --preload ./tests/unit/dom-setup.ts tests/

  test-macos-bun:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install image dependencies (macOS)
        run: brew install imagemagick

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (Bun)
        run: bun install

      - name: Install examples dependencies (Bun)
        run: cd examples && bun install

      - name: Warm examples build cache
        run: cd examples && bun run ../src/cli.ts build

      # 同上：依赖 bun install 后的 node_modules，非 Bun 专属命令
      - name: Install Playwright Chromium
        run: ./node_modules/.bin/playwright install chromium

      - name: Test (Bun, macOS)
        run: bun test --preload ./tests/unit/dom-setup.ts tests/

  test-windows-bun:
    runs-on: windows-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\.playwright-browsers
    steps:
      - uses: actions/checkout@v5

      - name: Install image dependencies (Windows)
        run: choco install imagemagick -y
        shell: pwsh

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (Bun)
        run: bun install

      - name: Install examples dependencies (Bun)
        run: cd examples && bun install

      - name: Warm examples build cache
        run: cd examples && bun run ../src/cli.ts build

      # 与 Linux/macOS Bun job 一致：安装与 lockfile 对齐的 Chromium（PLAYWRIGHT_BROWSERS_PATH 已指 workspace 缓存）
      - name: Install Playwright Chromium
        shell: pwsh
        run: npx playwright install chromium

      # 全量测试含 E2E；若 Bun 在 Windows 上仍出现 chromium.launch 卡住（oven-sh/bun#15679），可改回仅 tests/integration tests/unit
      - name: Test (Bun, Windows)
        shell: pwsh
        run: bun test --preload ./tests/unit/dom-setup.ts tests/
        timeout-minutes: 25
